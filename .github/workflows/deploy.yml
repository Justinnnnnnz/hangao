name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20
  DEPLOY_PATH: /var/www/hangao/dist

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.TENCENT_SERVER_HOST }}
          SERVER_PORT: ${{ secrets.TENCENT_SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload dist files
        env:
          SERVER_HOST: ${{ secrets.TENCENT_SERVER_HOST }}
          SERVER_PORT: ${{ secrets.TENCENT_SERVER_PORT }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SERVER_PORT:-22}" \
            dist/ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      - name: Verify deployed files
        env:
          SERVER_HOST: ${{ secrets.TENCENT_SERVER_HOST }}
          SERVER_PORT: ${{ secrets.TENCENT_SERVER_PORT }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "test -f ${DEPLOY_PATH}/index.html && ls -la ${DEPLOY_PATH} | head"

